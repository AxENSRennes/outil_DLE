services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command: ["python", "backend/manage.py", "runserver", "0.0.0.0:8000"]
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.uat}
      POSTGRES_DB: ${POSTGRES_DB:-dle_saas}
      POSTGRES_USER: ${POSTGRES_USER:-dle_saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dle_saas}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    environment:
      VITE_APP_TITLE: ${VITE_APP_TITLE:-DLE-SaaS}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}

  db:
    image: postgres:17.9-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dle_saas}
      POSTGRES_USER: ${POSTGRES_USER:-dle_saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dle_saas}
