services:
  db:
    image: postgres:17.9-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required for UAT deployments}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required for UAT deployments}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for UAT deployments}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required for UAT deployments} -d ${POSTGRES_DB:?POSTGRES_DB is required for UAT deployments}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command:
      - sh
      - -c
      - python backend/manage.py migrate && exec gunicorn --bind 0.0.0.0:8000 --workers 2 config.wsgi:application
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.uat}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required for UAT deployments}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required for UAT deployments}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required for UAT deployments}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for UAT deployments}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    environment:
      VITE_APP_TITLE: ${VITE_APP_TITLE:-DLE-SaaS}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
