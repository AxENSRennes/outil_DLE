name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff lint
        run: python -m ruff check backend

      - name: Ruff format check
        run: python -m ruff format --check backend

      - name: Mypy
        run: python -m mypy backend

      - name: Pytest
        run: python -m pytest backend

      - name: Backend architecture check
        run: python tools/check_backend_architecture.py

      - name: Bandit
        run: python -m bandit -r backend -x backend/tests

      - name: pip-audit
        run: python -m pip_audit

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend tooling
        run: npm install --prefix frontend

      - name: ESLint
        run: npm --prefix frontend run lint

      - name: TypeScript
        run: npm --prefix frontend run typecheck

      - name: Vitest
        run: npm --prefix frontend run test

      - name: Frontend architecture check
        run: npm --prefix frontend run architecture-check

      - name: React Doctor
        run: npm --prefix frontend run doctor

  secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
